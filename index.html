<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon - Adidas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="mobile-container">
    <header>
      <section class="hero-banner">
        <div class="logo-wrapper">
          <img 
            src="https://assets.codepen.io/6060109/2560px-Adidas_Logo+1.png" 
            alt="Adidas logo"
          >
        </div>
        <div class="hero-image"></div>
      </section>
    </header>

    <main>
      <article class="text-info">
        <h2>We're</h2>
        <h2>Coming<br>Soon</h2>

        <p>
          Hello friends! We are currently building our new sports and comfort clothing store.
          Add your email address below to stay up-to-date with announcements and our launch proposals.
        </p>

        <section class="email-signup">
          <form action="#" method="post">
            <input
              class="email-input"
              type="email"
              name="email-address"
              placeholder="Email Address"
              required
            >

            <input
              class="email-submit"
              type="submit"
              value="Go"
            >
          </form>
        </section>
      </article>
    </main>
  </div>

  <div class="hero-image-desktop">
    <img
      src="https://assets.codepen.io/6060109/athlete-big.png"
      alt="Female athlete squinting towards the camera"
    >
  </div>
</body>
</html>
